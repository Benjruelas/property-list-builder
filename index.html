  <body>
    <script>
      (function() {
        var ruler = document.createElement('div');
        ruler.style.cssText = 'position:fixed;width:1px;height:100vh;top:0;pointer-events:none;visibility:hidden;';
        document.body.appendChild(ruler);
        function setViewportHeight() {
          var h = ruler.offsetHeight || window.innerHeight;
          document.documentElement.style.setProperty('--vw-height', h + 'px');
        }
        setViewportHeight();
        requestAnimationFrame(setViewportHeight);
        window.visualViewport?.addEventListener('resize', setViewportHeight);
        window.visualViewport?.addEventListener('scroll', setViewportHeight);
        window.addEventListener('resize', setViewportHeight);
        window.addEventListener('load', setViewportHeight);
      })();
    </script>
    <div id="root"></div>
    <div id="modal-root" style="position: fixed; inset: 0; z-index: 2147483647; pointer-events: none; isolation: isolate;"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
